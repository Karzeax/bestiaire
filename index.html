<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bestiaire</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Bestiaire</h1>
  <p>Répertoire des créatures connues</p>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Rechercher un monstre…" autocomplete="off">
</div>

<p class="count" id="count"></p>

<div id="results"></div>
<div class="empty" id="empty">
  <span class="empty-icon">🌫️</span>
  Aucun monstre trouvé.
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Données puis logique -->
<script src="monsters.js"></script>
<script src="main.js"></script>

</body>
</html>

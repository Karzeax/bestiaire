<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bestiaire</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Bestiaire</h1>
  <p>Répertoire des créatures qui peuplent les terres de Kigard</p>
</header>

<div class="search-wrap">
  <div class="search-modes" role="tablist" aria-label="Mode de recherche">
    <button type="button" class="search-mode active" data-mode="name" role="tab" aria-selected="true">Monstres</button>
    <button type="button" class="search-mode" data-mode="competences" role="tab" aria-selected="false">Compétences</button>
    <button type="button" class="search-mode" data-mode="items" role="tab" aria-selected="false">Items</button>
    <button type="button" class="search-mode" data-mode="drops" role="tab" aria-selected="false">Drops</button>
  </div>
  <input type="text" id="search" placeholder="Rechercher un monstre…" autocomplete="off">
  <div class="zone-filters" role="group" aria-label="Filtrer par zone">
    <button type="button" class="zone-filter active" data-region="Nandor" aria-pressed="true">Nandor</button>
    <button type="button" class="zone-filter active" data-region="Kigard" aria-pressed="true">Kigard</button>
  </div>
</div>

<p class="count" id="count"></p>

<div id="results"></div>
<div class="empty" id="empty">
  <span class="empty-icon">🌫️</span>
  Aucun monstre trouvé.
</div>

<!-- Bouton retour en haut -->
<button class="back-to-top" id="back-to-top" aria-label="Retour en haut">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Données puis logique -->
<script src="monsters.js"></script>
<script src="main.js"></script>

</body>
</html>
